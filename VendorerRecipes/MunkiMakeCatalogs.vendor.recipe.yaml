Description: Obtains upstream MunkiMakeCatalogs recipe from autopkg/recipes

Identifier: com.github.discentem.VendoredMunkiMakeCatalogs

MinimumVersion: '3.0'

Input: {}
Process:
  - Processor: com.github.discentem.SharedProcessors/AutopkgVendorer
    Arguments:
      github_repo: autopkg/recipes
      destination_path: Munki
      assets: 
        - Munki/MakeCatalogs.munki.recipe
        - Munki/MakeCatalogsProcessor.py
      commit_sha: a501cf3dc4a6c72675b596dd2354602bd611fe3e
      convert_to_yaml: true
      required_license: Apache-2.0